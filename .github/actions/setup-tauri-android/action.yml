name: Setup the Tauri Android toolchain
description: >
  Prepare a runner to build the Tauri Android app: set up Bun, JDK, the Android
  SDK/NDK, Rust with the Android targets, install workspace deps, and materialize
  the release signing keystore from secrets (gradle reads keystore.properties).
  Leaves the actual build to tauri-apps/tauri-action. The repo must already be
  checked out before this runs.

inputs:
  keystore-base64:
    description: Base64-encoded release keystore (.jks/.keystore). Omit for an unsigned/debug build (e.g. PR checks).
    required: false
  keystore-password:
    description: Password for the keystore and the signing key (shared).
    required: false
  key-alias:
    description: Alias of the signing key inside the keystore.
    required: false

outputs:
  ndk-home:
    description: Resolved NDK path to export as NDK_HOME for the build.
    value: ${{ steps.ndk.outputs.ndk-home }}

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Rust with Android targets
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

    - name: Cache Rust build
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: frontend/src-tauri -> target

    - name: Install dependencies
      shell: bash
      run: bun install

    - name: Materialize signing keystore
      # Skipped when no keystore is provided — the build then stays unsigned (PR checks).
      if: ${{ inputs.keystore-base64 != '' }}
      shell: bash
      working-directory: frontend/src-tauri/gen/android
      env:
        KEYSTORE_BASE64: ${{ inputs.keystore-base64 }}
        KEYSTORE_PASSWORD: ${{ inputs.keystore-password }}
        KEY_ALIAS: ${{ inputs.key-alias }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
        cat > keystore.properties <<EOF
        password=$KEYSTORE_PASSWORD
        keyAlias=$KEY_ALIAS
        storeFile=$RUNNER_TEMP/release.keystore
        EOF

    - name: Resolve NDK path
      id: ndk
      shell: bash
      # The runner ships an NDK at ANDROID_NDK_LATEST_HOME; Tauri needs it via NDK_HOME.
      run: echo "ndk-home=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_OUTPUT"
