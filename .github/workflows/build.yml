name: Tauri Build

on:
  push:
    branches:
      - main
    # Only the Tauri frontend produces the apps; skip pushes that don't touch it.
    paths:
      - frontend/**
      - .github/actions/setup-tauri-android/action.yml
      - .github/workflows/build.yml
  workflow_dispatch:

jobs:
  desktop:
    name: Build & release ${{ matrix.label }} app
    permissions:
      # tauri-action creates the GitHub release / uploads the installers.
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
          - platform: ubuntu-latest
            label: Linux
          - platform: macos-latest
            label: macOS
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Linux build dependencies
        # webkit2gtk + friends are required to compile the Tauri shell on Linux.
        if: ${{ matrix.platform == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Install dependencies
        run: bun install

      - name: Build app and publish GitHub release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tauriScript: bun tauri
          # Windows → .msi/.exe, Linux → .deb/.rpm/.AppImage (bundle.targets = "all").
          tagName: app-v__VERSION__
          releaseName: ReqSpec v__VERSION__
          releaseDraft: false
          prerelease: false

  android:
    name: Build & release Android app
    runs-on: ubuntu-latest
    permissions:
      # tauri-action creates the GitHub release / uploads the APK.
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Tauri Android toolchain
        id: setup
        uses: ./.github/actions/setup-tauri-android
        with:
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Compute versionCode from commit timestamp
        id: vc
        # HEAD's committer epoch (minutes): deterministic per commit, monotonic on main,
        # needs only HEAD (no full history) and stays well under Play's 2.1e9 ceiling.
        run: echo "code=$(( $(git show -s --format=%ct HEAD) / 60 ))" >> "$GITHUB_OUTPUT"

      - name: Build APK and publish GitHub release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ steps.setup.outputs.ndk-home }}
          # Unique, increasing versionCode so each Play upload is accepted.
          ANDROID_VERSION_CODE: ${{ steps.vc.outputs.code }}
        with:
          projectPath: frontend
          tauriScript: bun tauri
          mobile: android
          # APK only: tauri-action attaches every file it builds to the release, and the
          # AAB must go to the Play Store instead. The AAB is built separately below.
          args: --apk
          tagName: app-v__VERSION__
          releaseName: ReqSpec v__VERSION__
          releaseDraft: false
          prerelease: false

      - name: Build AAB for the Play Store
        working-directory: frontend
        env:
          NDK_HOME: ${{ steps.setup.outputs.ndk-home }}
          # Must match the APK build above so the release and the Play upload share a code.
          ANDROID_VERSION_CODE: ${{ steps.vc.outputs.code }}
        # Reuses the Rust libs already compiled by the APK build; only re-bundles.
        run: bun tauri android build --aab

      - name: Upload AAB to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          # Must match the Android applicationId in gen/android/app/build.gradle.kts.
          packageName: com.hyoretsu.reqspec
          releaseFiles: frontend/src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          track: production
          status: completed

  ios:
    name: Build iOS app (stub)
    # Stub slot: iOS shipping needs a macOS runner, an Apple Developer account and
    # signing certs/provisioning profiles that aren't wired up yet. Kept as a
    # placeholder so the platform is tracked; flip to a real build once those exist.
    runs-on: ubuntu-latest
    steps:
      - name: iOS build not configured
        run: |
          echo "::notice title=iOS::iOS build is a stub."
          echo "To enable: run on macos-latest, 'bun tauri ios init', then"
          echo "'bun tauri ios build' with APPLE signing secrets and a provisioning profile."
