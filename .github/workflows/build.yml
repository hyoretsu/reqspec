name: Build

on:
  push:
    branches:
      - main
    # Only the Tauri frontend produces the Android app; skip pushes that don't touch it.
    paths:
      - frontend/**
      - .github/actions/setup-tauri-android/action.yml
      - .github/workflows/build.yml
  workflow_dispatch:

jobs:
  android:
    name: Build Android app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Tauri Android toolchain
        id: setup
        uses: ./.github/actions/setup-tauri-android
        with:
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Build Android app
        uses: tauri-apps/tauri-action@v0
        env:
          NDK_HOME: ${{ steps.setup.outputs.ndk-home }}
        with:
          projectPath: frontend
          tauriScript: bun tauri
          mobile: android
          # Emit both the installable APK and the Play Store bundle.
          args: --apk --aab

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reqspec-android
          if-no-files-found: error
          path: |
            frontend/src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk
            frontend/src-tauri/gen/android/app/build/outputs/bundle/**Release/*.aab
