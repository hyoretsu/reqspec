name: Build and Publish to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  detect:
    name: Detect affected
    runs-on: ubuntu-latest
    outputs:
      # {"build":["backend",...]} — only backend/frontend define a `build` script, so
      # detect-affected already yields just the deployable services. A matrix built
      # from [] spawns no jobs, so an unaffected push emits no image. An empty
      # base-sha (workflow_dispatch / first push) plans every service.
      tasks: ${{ steps.affected.outputs.tasks }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Need history present so Turbo's --affected can diff against the base.
          fetch-depth: 0

      - name: Compute affected services
        id: affected
        uses: ./.github/actions/detect-affected
        with:
          tasks: build
          base-sha: ${{ github.event.before }}

  build_publish:
    name: Build and publish ${{ matrix.service }} image
    needs: detect
    if: ${{ fromJSON(needs.detect.outputs.tasks).build[0] }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect.outputs.tasks).build }}
        include:
          - service: backend
            dockerfile: backend/Dockerfile
            build_args: |
              NODE_ENV=production
          - service: frontend
            dockerfile: frontend/Dockerfile
            build_args: |
              NODE_ENV=production
              VITE_API_URL=${{ vars.VITE_API_URL }}
              VITE_APP_URL=${{ vars.VITE_APP_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}_${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYYMMDD'}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          secrets: ${{ matrix.service == 'backend' && format('DATABASE_URL={0}', secrets.DATABASE_URL) || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
