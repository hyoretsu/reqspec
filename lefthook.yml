assert_lefthook_installed: true

commit-msg:
  parallel: true
  jobs:
    - name: "Validate commit message"
      run: bunx commitlint --edit {1}

post-merge:
  parallel: true
  jobs:
    - name: "Git configs"
      run: |
        git config core.ignorecase false
        git config core.longpaths true
        git config push.autoSetupRemote true

    - name: "Install dependencies"
      run: bun i

pre-commit:
  parallel: true
  jobs:
    - name: "Format and lint"
      group:
        piped: true
        jobs:
          - name: Biome
            glob: "*.(astro|cjs|css|graphql|grit|html|js|json|jsonc|jsx|md|mjs|scss|svelte|ts|tsx|vue|yaml|yml)"
            run: bunx @biomejs/biome check --diagnostic-level=error --files-ignore-unknown=true --no-errors-on-unmatched --write --unsafe {staged_files}
            stage_fixed: true

          - name: ESLint
            glob: "*.(cjs|js|jsx|mjs|ts|tsx)"
            run: bunx eslint --quiet --fix --no-error-on-unmatched-pattern {staged_files}
            stage_fixed: true

    # Coverage gate: the DB-free unit suite runs with --coverage and bunfig's
    # coverageThreshold (0.95); below it `bun test` exits non-zero and blocks the
    # commit. Only triggers when backend source is staged.
    - name: "Unit coverage gate"
      glob: "backend/**/*.{ts,tsx}"
      run: cd backend && bun run test:unit

pre-push:
  parallel: true
  jobs:
    - name: "Fetch remote commits"
      run: |
        git pull
        exit 0

